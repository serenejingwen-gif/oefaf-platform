# OEFAF Platform — continuous integration.
#
# Lints and tests the platform on every push and pull request. All bundled data
# exercised by the test suite is synthetic illustrative data generated for
# demonstration; it is NOT real agency data and is NOT derived from any
# proprietary or employer source. The job runs fully offline (no network data
# pulls) and deterministically.
name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    name: Lint and test (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pinned dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests with pytest
        run: pytest gea/tests cricat/tests sdmac/tests shared
